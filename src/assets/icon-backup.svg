<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="256" height="256">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="#6366f1"/>
  <!-- Left bar -->
  <rect x="6" y="8" width="2" height="15" rx="1" fill="white"/>
  <!-- Right bar -->
  <rect x="24" y="8" width="2" height="15" rx="1" fill="white"/>
  <!-- Left diagonal -->
  <line x1="7" y1="8" x2="16" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right diagonal -->
  <line x1="25" y1="8" x2="16" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Down arrow -->
  <polyline points="12,18 16,23 20,18" stroke="white" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
